<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Najmusama Birthday Surprise 🌹</title>

<style>
body{
margin:0;
height:100vh;
background:linear-gradient(#05001a,#4b003b);
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
overflow:hidden;
}

.box{
padding:25px;
}

h1{
font-size:40px;
color:#ffd1dc;
text-shadow:0 0 20px pink;
}

p{
font-size:22px;
line-height:1.6;
}

button{
background:#ff4d88;
color:white;
border:none;
padding:15px 35px;
border-radius:50px;
font-size:20px;
}

.rose{
font-size:60px;
animation:float 3s infinite;
}

@keyframes float{
50%{transform:translateY(-20px);}
}
</style>
</head>

<body>

<div class="box" id="page">

<div class="rose">🌹</div>

<h1>Hello Najmusama</h1>

<p>
A special moment is waiting for you...<br><br>
August 19 🎂
</p>

<button onclick="ready()">Continue ✨</button>

</div>


<script>

function ready(){

document.getElementById("page").innerHTML=`

<div class="rose">🌹✨🌹</div>

<h1>Are You Ready?</h1>

<p>
Before the surprise begins...<br>
Close your eyes and make one beautiful wish.
</p>

<button onclick="wish()">I am ready 💖</button>

`;

}


function wish(){

document.getElementById("page").innerHTML=`

<h1>✨ 3... 2... 1... ✨</h1>

<p>
Your wish is made.<br><br>
Now the celebration begins...
</p>

<button onclick="birthday()">Open Surprise 🎉</button>

`;

}


function birthday(){

document.getElementById("page").innerHTML=`

<h1>🎂 Happy Birthday Najmusama 🎂</h1>

<p>
May Allah bless your life with happiness,
peace, success and beautiful memories. 🌹
</p>

<div style="font-size:70px">
🎂🕯️🌹
</div>

`;

}

</script>

</body>
</html>
