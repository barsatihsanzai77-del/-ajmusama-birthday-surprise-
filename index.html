<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Najmusama 🌹</title>

<style>

body{
margin:0;
height:100vh;
background:linear-gradient(#080018,#45002f);
color:white;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
overflow:hidden;
}

.box{
z-index:5;
padding:25px;
}

h1{
font-size:38px;
color:#ffd6e7;
text-shadow:0 0 20px #ff69b4;
}

p{
font-size:20px;
line-height:1.6;
}

button{
background:#ff4d88;
color:white;
border:none;
padding:15px 35px;
border-radius:40px;
font-size:20px;
}

.rose{
position:fixed;
top:-50px;
font-size:35px;
animation:fall 6s linear;
z-index:2;
}

@keyframes fall{

from{
transform:translateY(-50px) rotate(0deg);
}

to{
transform:translateY(100vh) rotate(360deg);
}

}

#fireworks{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:1;
}

.message{
animation:glow 2s infinite;
}

@keyframes glow{
50%{
text-shadow:0 0 25px pink;
}
}

</style>

</head>


<body>


<canvas id="fireworks"></canvas>


<div class="box" id="box">

<h1>🌹 A Secret Surprise 🌹</h1>

<p>
Something special is waiting for you...
</p>

<button onclick="start()">
✨ Start
</button>

</div>



<script>


// roses

setInterval(()=>{

let rose=document.createElement("div");

rose.className="rose";

rose.innerHTML="🌹";

rose.style.left=Math.random()*100+"vw";

document.body.appendChild(rose);


setTimeout(()=>{
rose.remove();
},6000);


},500);



// first button

function start(){

document.getElementById("box").innerHTML=`

<h1>✨ Are You Ready? ✨</h1>

<p>
A beautiful moment is waiting...
</p>

<button onclick="ready()">
💖 Yes
</button>

`;

}



// wish

function ready(){

document.getElementById("box").innerHTML=`

<h1>👀 Close Your Eyes</h1>

<p>
Make a beautiful wish<br>
and keep a smile in your heart.
</p>

<button onclick="count()">
🌙 Done
</button>

`;

}



// countdown

function count(){

let n=3;

let box=document.getElementById("box");

let timer=setInterval(()=>{

box.innerHTML=`

<h1>✨ ${n} ✨</h1>

`;

n--;


if(n<1){

clearInterval(timer);

birthday();

}


},1000);

}



// birthday

function birthday(){

document.getElementById("box").innerHTML=`

<h1>🎂 Happy Birthday Najmusama 🎂</h1>

<p class="message">

May Allah bless your life with happiness,
peace, success, and beautiful memories.

<br><br>

Always keep smiling and believe in yourself.

<br><br>

🌹 — Barsadullah

</p>

`;

}



// fireworks

let canvas=document.getElementById("fireworks");

let ctx=canvas.getContext("2d");


canvas.width=innerWidth;
canvas.height=innerHeight;


let particles=[];


function firework(){

let x=Math.random()*canvas.width;
let y=Math.random()*canvas.height/2;


for(let i=0;i<60;i++){

particles.push({

x:x,
y:y,
dx:(Math.random()-0.5)*8,
dy:(Math.random()-0.5)*8,
life:100

});


}

}



function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);


particles.forEach((p,i)=>{

ctx.fillStyle="white";

ctx.fillRect(p.x,p.y,3,3);


p.x+=p.dx;
p.y+=p.dy;

p.life--;


if(p.life<=0){

particles.splice(i,1);

}


});


requestAnimationFrame(animate);

}


setInterval(firework,700);

animate();


</script>


</body>
</html>
