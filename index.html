<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Najmusama 🌹</title>

<style>.letter{
background:rgba(255,255,255,0.95);
color:#111;
padding:18px;
border-radius:20px;
max-width:350px;
margin:auto;
box-shadow:0 0 25px pink;
font-size:18px;
line-height:1.4;
}

.lollipop{
position:fixed;
font-size:45px;
animation:floatCandy 4s infinite;
z-index:1;
}

@keyframes floatCandy{
50%{
transform:translateY(-25px) rotate(10deg);
}
}

.dark{
color:#222;
}

.white{
color:white;
text-shadow:0 0 10px pink;
}
.cake{
font-size:80px;
animation:cakeGlow 2s infinite;
}

.balloons{
font-size:45px;
animation:float 3s infinite;
}

.birthdayTitle{
animation:appear 2s;
}

@keyframes cakeGlow{
50%{
transform:scale(1.1);
text-shadow:0 0 30px pink;
}
}

@keyframes float{
50%{
transform:translateY(-20px);
}
}

@keyframes appear{
from{
opacity:0;
transform:scale(0.5);
}
to{
opacity:1;
transform:scale(1);
}
  }
body{
margin:0;
height:100vh;
background:linear-gradient(#050014,#45002f);
color:white;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
overflow:hidden;
}

.box{
z-index:5;
padding:25px;
}

h1{
font-size:38px;
color:#ffd6e7;
text-shadow:0 0 20px pink;
}

p{
font-size:20px;
line-height:1.7;
}

button{
background:#ff4d88;
color:white;
border:none;
padding:15px 35px;
border-radius:40px;
font-size:20px;
}

.rose{
position:fixed;
top:-50px;
font-size:35px;
animation:fall 6s linear;
z-index:2;
}

@keyframes fall{
from{
transform:translateY(-50px) rotate(0deg);
}
to{
transform:translateY(100vh) rotate(360deg);
}
}

#fireworks{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:1;
}

.message{
animation:glow 2s infinite;
}

@keyframes glow{
50%{
text-shadow:0 0 25px white;
}
}

</style>

</head>

<body>

<canvas id="fireworks"></canvas>

<div class="box" id="box">

<h1>🌹 A Secret Surprise 🌹</h1>

<p>
A special moment is waiting for you...
</p>

<button onclick="start()">
✨ Start
</button>

</div>
<script>

// Falling roses

setInterval(function(){

let rose = document.createElement("div");

rose.className = "rose";

rose.innerHTML = "🌹";

rose.style.left = Math.random() * 100 + "vw";

document.body.appendChild(rose);

setTimeout(function(){
rose.remove();
},6000);

},500);


// Start button

function start(){

document.getElementById("box").innerHTML = `

<h1>✨ Are You Ready? ✨</h1>

<p>
A beautiful surprise is waiting...
</p>

<button onclick="wish()">
💖 Yes
</button>

`;

}


// Wish button

function wish(){

document.getElementById("box").innerHTML = `

<h1>👀 Close Your Eyes</h1>

<p>
Make a beautiful wish<br>
and press done when you finish.
</p>

<button onclick="countdown()">
🌙 Done
</button>

`;

}


// Countdown

function countdown(){

let number = 3;

let timer = setInterval(function(){

document.getElementById("box").innerHTML = `

<h1>✨ ${number} ✨</h1>

`;

number--;

if(number < 0){

clearInterval(timer);

birthday();

}

},1000);

}


// Birthday screen

function birthday(){

document.getElementById("box").innerHTML = `

<h1 class="birthdayTitle">
🎂 Happy Birthday Najmusama 🎂
</h1>

<div class="cake">
🕯️<br>
🎂
</div>

<div class="balloons">
🎈 🎈 🎈
</div>

<p class="message">

May Allah bless your life with happiness,
peace, success, and beautiful memories.

<br><br>

✨ A new year of your life begins with new hopes and beautiful moments. ✨

<br><br>

<button onclick="finalMessage()">
💌 Open Special Message
</button>

</p>

`;

}






// Final message

function finalMessage(){

document.getElementById("box").innerHTML = `

<h1 class="white">💌 A Special Letter 💌</h1>

<div class="letter">

<p class="dark">

Your name is my favorite word in the whole world.

<br><br>

Your voice is my favorite sound in this entire life.

<br><br>

Your happiness is one of my favorite prayers.

<br><br>

Everything that belongs to you becomes special to me too.

<br><br>

You are a very important person in my life, inshallah.

<br><br>

Happy Birthday Najmusama 🎂

<br><br>

🌹 — Barsadullah

</p>

</div>

`;


// lollipop background

setInterval(()=>{

let candy=document.createElement("div");

candy.className="lollipop";

candy.innerHTML="🍭";

candy.style.left=Math.random()*100+"vw";
candy.style.top=Math.random()*100+"vh";

document.body.appendChild(candy);

setTimeout(()=>{
candy.remove();
},5000);

},700);


}




// Fireworks

let canvas = document.getElementById("fireworks");

let ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let particles = [];


function firework(){

let x = Math.random()*canvas.width;

let y = Math.random()*canvas.height/2;


for(let i=0;i<50;i++){

particles.push({

x:x,
y:y,
dx:(Math.random()-0.5)*8,
dy:(Math.random()-0.5)*8,
life:100

});

}

}


function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);


particles.forEach((p,i)=>{

ctx.fillStyle="white";

ctx.fillRect(p.x,p.y,3,3);

p.x += p.dx;
p.y += p.dy;

p.life--;


if(p.life<=0){

particles.splice(i,1);

}

});


requestAnimationFrame(animate);

}


setInterval(firework,700);

animate();


</script>

</body>
</html>
