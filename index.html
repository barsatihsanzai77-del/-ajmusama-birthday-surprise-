<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Najmusama 🌹</title>

<style>.rose {
  position: fixed;
  top: -50px;
  font-size: 30px;
  animation: fall 6s linear infinite;
  z-index: 999;
}

@keyframes fall {
  0% {
    transform: translateY(-50px) rotate(0deg);
    opacity: 1;
  }
  100% {
    transform: translateY(100vh) rotate(360deg);
    opacity: 0;
  }
}
  
body{
margin:0;
height:100vh;
background:linear-gradient(#050014,#40002f);
color:white;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
overflow:hidden;
}

.box{
padding:25px;
}

h1{
font-size:38px;
color:#ffd6e7;
text-shadow:0 0 20px #ff69b4;
}

p{
font-size:20px;
line-height:1.6;
}

button{
background:#ff4d88;
color:white;
border:none;
padding:15px 35px;
border-radius:40px;
font-size:20px;
}

.rose{
font-size:70px;
animation:move 3s infinite;
}

@keyframes move{
50%{
transform:translateY(-20px);
}
}
</style>

</head>

<body>

<div class="box" id="box">

<div class="rose">🌹</div>

<h1>A Secret Surprise</h1>

<p>
For<br>
<b>Najmusama</b><br><br>
August 19 🎂
</p>

<p>
A beautiful moment is waiting for you...
</p>

<button onclick="ready()">
✨ Enter
</button>

</div>


<script>

function ready(){

document.getElementById("box").innerHTML=`

<div class="rose">🌹✨🌹</div>

<h1>Are You Ready?</h1>

<p>
Close your eyes for a second...<br>
Make a beautiful wish.
</p>

<button onclick="wish()">
💖 Yes
</button>

`;

}


function wish(){

document.getElementById("box").innerHTML=`

<h1>✨ 3... 2... 1... ✨</h1>

<p>
Your wish is made 🌙<br><br>
The birthday surprise begins...
</p>

<button onclick="birthday()">
🎉 Open
</button>

`;

}


function birthday(){

document.getElementById("box").innerHTML=`

<div class="rose">🎂🌹🎈</div>
<h1>
Happy 14th Birthday Najmusama 🎂🌹
</h1>

<p>
May Allah fill your life with happiness, peace, success, and countless blessings.
<br><br>
Today is a special day to celebrate you and the beautiful person you are.
<br><br>
I hope this new year brings you amazing moments, bright opportunities, and a future full of success.
<br><br>
Keep smiling and always believe in yourself.
<br><br>
🌹 - Barsadullah
</p>

<h1>
Happy Birthday Najmusama 🎂
</h1>

<p>
May Allah bless your life with happiness,
peace, success, and beautiful memories.
</p>

<p>
🌹 — Barsadullah
</p>

`;

}

</script>

</body>
</html>
