<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Najmusama 🌹</title>

<style>

body{
margin:0;
height:100vh;
background:linear-gradient(#080018,#500038);
color:white;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
overflow:hidden;
}

.box{
z-index:5;
padding:25px;
}

h1{
font-size:38px;
color:#ffd6e7;
text-shadow:0 0 20px #ff69b4;
}

p{
font-size:20px;
line-height:1.6;
}

button{
background:#ff4d88;
color:white;
border:none;
padding:15px 35px;
border-radius:40px;
font-size:20px;
}

.rose{
position:fixed;
top:-50px;
font-size:35px;
animation:fall 6s linear;
z-index:2;
}

@keyframes fall{
from{
transform:translateY(-50px) rotate(0deg);
}
to{
transform:translateY(100vh) rotate(360deg);
}
}

#fireworks{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:1;
}

.glow{
animation:glow 2s infinite;
}

@keyframes glow{
50%{
text-shadow:0 0 25px white;
}
}

</style>

</head>
